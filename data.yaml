# AI Speed Radar - YOLO Dataset Configuration
# Vehicle detection dataset for speed estimation

# Dataset paths (update these to match your actual dataset locations)
path: ./datasets/vehicles        # root dataset directory
train: ./train/images             # training images (relative to path)
val: ./val/images                 # validation images (relative to path)
test: ./test/images               # test images (optional, relative to path)

# Number of classes
nc: 6

# Class names
names:
  0: car
  1: motorcycle
  2: bus
  3: truck
  4: van
  5: bicycle

# Optional: download script/URL for the dataset
# download: |
#   python scripts/download_dataset.py
